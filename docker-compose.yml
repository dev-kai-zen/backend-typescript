services:
  db:
    image: mysql:8.4
    container_name: backend-ts-mysql
    environment:
      MYSQL_DATABASE: boilerplate_db
      MYSQL_USER: boilerplate
      MYSQL_PASSWORD: boilerplate_pass
      MYSQL_ROOT_PASSWORD: root_boilerplate_local
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-proot_boilerplate_local",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-ts-api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Hostname `db` is the MySQL service on the Compose network (not localhost).
      DATABASE_URL: mysql://boilerplate:boilerplate_pass@db:3306/boilerplate_db
      JWT_SECRET: ${JWT_SECRET:-change-me-docker-compose-use-long-random-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-353225171076-cjfmj00lkitvau28je78horfa0ic4k50.apps.googleusercontent.com}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      # Optional local convenience only — see docs/deployment-guide.md §11.
      # RUN_MIGRATIONS_ON_START: "true"

volumes:
  mysql_data:
